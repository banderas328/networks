version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    working_dir: /var/www/html/osoctopus/osoctopus/octopusos

    volumes:
      - ./:/var/www/html

    environment:
      APP_ENV: local
      DB_HOST: db
      DB_NAME: networks
      DB_USER: networks
      DB_PASS: networks

    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started

    restart: unless-stopped

    networks:
      - networks_net


  nginx:
    image: nginx:1.27-alpine

    ports:
      - "8080:80"

    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - app

    restart: unless-stopped

    networks:
      - networks_net


  db:
    image: mariadb:10.11

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: networks
      MYSQL_USER: networks
      MYSQL_PASSWORD: networks

    ports:
      - "3306:3306"

    volumes:
      - ./database:/docker-entrypoint-initdb.d:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - networks_net


  phpmyadmin:
    image: phpmyadmin:5-apache

    environment:
      PMA_HOST: db
      PMA_USER: networks
      PMA_PASSWORD: networks
      UPLOAD_LIMIT: 200M

    ports:
      - "8081:80"

    depends_on:
      - db

    restart: unless-stopped

    networks:
      - networks_net


  memcached:
    image: memcached:1.6-alpine

    ports:
      - "11211:11211"

    restart: unless-stopped

    networks:
      - networks_net


networks:
  networks_net:
    driver: bridge