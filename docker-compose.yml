version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: networks_app
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_NAME: networks
      DB_USER: networks
      DB_PASS: networks
    networks:
      - networks_net

  nginx:
    image: nginx:alpine
    container_name: networks_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - networks_net

  db:
    image: mariadb:10.6
    container_name: networks_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: networks
      MYSQL_USER: networks
      MYSQL_PASSWORD: networks
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d   # импорт octopus.sql
    ports:
      - "3306:3306"
    networks:
      - networks_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: networks_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: networks
      PMA_PASSWORD: networks
      UPLOAD_LIMIT: 200M
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - networks_net

volumes:
  db_data:

networks:
  networks_net:
    driver: bridge
